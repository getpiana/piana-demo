    const DonutChart = ({ data, width = 300, height = 300 }) => {
      const cx = width / 2, cy = height / 2, outerR = 120, innerR = 80;
      const total = data.reduce((s, d) => s + d.value, 0);
      let cumulative = 0;
      const arcs = data.map(d => {
        const startAngle = (cumulative / total) * 2 * Math.PI - Math.PI / 2;
        cumulative += d.value;
        const endAngle = (cumulative / total) * 2 * Math.PI - Math.PI / 2;
        const largeArc = (d.value / total) > 0.5 ? 1 : 0;
        const x1o = cx + outerR * Math.cos(startAngle), y1o = cy + outerR * Math.sin(startAngle);
        const x2o = cx + outerR * Math.cos(endAngle), y2o = cy + outerR * Math.sin(endAngle);
        const x2i = cx + innerR * Math.cos(endAngle), y2i = cy + innerR * Math.sin(endAngle);
        const x1i = cx + innerR * Math.cos(startAngle), y1i = cy + innerR * Math.sin(startAngle);
        const path = `M ${x1o} ${y1o} A ${outerR} ${outerR} 0 ${largeArc} 1 ${x2o} ${y2o} L ${x2i} ${y2i} A ${innerR} ${innerR} 0 ${largeArc} 0 ${x1i} ${y1i} Z`;
        const midAngle = (startAngle + endAngle) / 2;
        const labelR = outerR + 25;
        const lx = cx + labelR * Math.cos(midAngle), ly = cy + labelR * Math.sin(midAngle);
        return { ...d, path, lx, ly, pct: Math.round((d.value / total) * 100) };
      });
      return (
        <svg viewBox={`0 0 ${width} ${height}`} style={{ width: '100%', maxWidth: width, height: 'auto', margin: '0 auto', display: 'block' }}>
          {arcs.map((a, i) => <path key={i} d={a.path} fill={a.color} stroke="white" strokeWidth="2" />)}
          {arcs.map((a, i) => <text key={'l'+i} x={a.lx} y={a.ly} textAnchor="middle" dominantBaseline="middle" fontSize="12" fill="#374151">{a.pct}%</text>)}
        </svg>
      );
    };
